<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Psicopata — 6 Meses</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f0;
    --muted: #555;
    --accent: #c8ff00;
    --listening: #00d4ff;
    --speaking: #ff9f7a;
    --reading: #b37eff;
    --writing: #ffd166;
    --extra: #ff6b35;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 40px; }

  /* HEADER */
  .header { padding: 40px 20px 24px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .date-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-top: 8px; }

  /* PROGRESS RING */
  .progress-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .ring-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
  svg.ring { width: 52px; height: 52px; }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 4; }
  .ring-fill { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 132; stroke-dashoffset: 132; transition: stroke-dashoffset 0.5s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
  .ring-text { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; fill: var(--text); }

  /* DAY SELECTOR */
  .days { display: flex; gap: 8px; padding: 0 20px 20px; overflow-x: auto; scrollbar-width: none; }
  .days::-webkit-scrollbar { display: none; }
  .day-btn {
    flex: none;
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; transition: all 0.2s;
    min-width: 56px;
  }
  .day-btn.active { background: var(--accent); border-color: var(--accent); }
  .day-name { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
  .day-btn.active .day-name { color: #000; }
  .day-dot-row { display: flex; gap: 2px; height: 6px; align-items: center; }
  .day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }
  .day-dot.done { background: var(--accent); }
  .day-btn.active .day-dot { background: rgba(0,0,0,0.25); }
  .day-btn.active .day-dot.done { background: #000; }

  /* RESET BTN */
  .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 20px 16px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .reset-btn {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); background: none; border: 1px solid var(--border);
    border-radius: 100px; padding: 6px 14px; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { color: var(--extra); border-color: var(--extra); }

  /* TASKS */
  .tasks { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }

  .task-group-label {
    font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    padding: 16px 0 4px;
  }
  .task-group-label:first-child { padding-top: 0; }

  .task {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    cursor: pointer; transition: all 0.2s; user-select: none;
    position: relative; overflow: hidden;
  }
  .task:hover { border-color: var(--border2); }
  .task.done { opacity: 0.5; }
  .task.done .task-title { text-decoration: line-through; color: var(--muted); }

  .task-icon { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; transition: transform 0.2s; }
  .task.done .task-icon { transform: scale(0.9); }

  .task-info { flex: 1; min-width: 0; }
  .task-title { font-size: 15px; font-weight: 500; color: var(--text); transition: color 0.2s; }
  .task-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .task-time { font-family: 'Syne', sans-serif; font-size: 11px; color: var(--muted); flex-shrink: 0; font-weight: 600; }

  .check {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; border: 1.5px solid var(--border2); background: var(--surface2);
    transition: all 0.2s;
  }
  .task.done .check { background: var(--accent); border-color: var(--accent); color: #000; }

  /* COLOR DOTS on left */
  .task::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--task-color, transparent);
    border-radius: 3px 0 0 3px;
  }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* CONFETTI DONE */
  .all-done {
    display: none; text-align: center; padding: 32px 20px;
    background: rgba(200,255,0,0.05); border: 1px solid rgba(200,255,0,0.2);
    border-radius: 16px; margin: 0 20px;
  }
  .all-done.show { display: block; }
  .all-done-icon { font-size: 40px; margin-bottom: 8px; }
  .all-done h2 { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--accent); margin-bottom: 6px; }
  .all-done p { font-size: 13px; color: var(--muted); }

  /* STATS BAR */
  .stats-bar { padding: 16px 20px; background: var(--surface); border-radius: 14px; margin: 0 20px 16px; border: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat { text-align: center; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .legend { padding: 16px 20px; display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>English <span>Psicopata</span></h1>
      <div class="subtitle">6 meses pra dominar</div>
      <div class="date-label" id="today-label"></div>
    </div>
    <div class="progress-wrap">
      <svg class="ring" viewBox="0 0 44 44">
        <circle class="ring-bg" cx="22" cy="22" r="21"/>
        <circle class="ring-fill" id="ring" cx="22" cy="22" r="21"/>
        <text class="ring-text" x="22" y="27" text-anchor="middle" id="ring-pct">0%</text>
      </svg>
      <div class="ring-label">Feito</div>
    </div>
  </div>
</div>

<div class="days" id="days"></div>

<div class="top-bar">
  <div class="section-title" id="day-title">—</div>
  <button class="reset-btn" onclick="resetDay()">Resetar dia</button>
</div>

<div class="stats-bar" id="stats"></div>

<div class="all-done" id="all-done">
  <div class="all-done-icon">🔥</div>
  <h2>Dia destruído!</h2>
  <p>Você é uma máquina. Dia de amanhã mata mais.</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background: var(--listening);"></div> Listening (Input)</div>
  <div class="legend-item"><div class="legend-dot" style="background: var(--speaking);"></div> Speaking (Fluência)</div>
  <div class="legend-item"><div class="legend-dot" style="background: var(--reading);"></div> Reading (Leitura)</div>
  <div class="legend-item"><div class="legend-dot" style="background: var(--writing);"></div> Writing (Escrita)</div>
</div>

<div class="tasks" id="tasks"></div>

<script>
const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];
const SHORT = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

// LISTENING = 00d4ff (input, consumo)
// SPEAKING = ff9f7a (produção, fala)
// READING = b37eff (leitura, material)
// WRITING = ffd166 (escrita, produção)

const COMMON_MORNING = [
  { id:'m1', group:'🌅  Manhã — Kickstart', title:'Duolingo Daily', sub:'30min — vocab + grammar focus', time:'5:30', color:'var(--reading)' },
  { id:'m2', group:null, title:'Khan Academy Grammar', sub:'1h — lições + exercícios (semanas 1-4)', time:'6:00', color:'var(--reading)' },
];

const LISTENING_HEAVY = [
  { id:'l1', group:'👂  Listening — Imersão passiva (input puro)', title:'Podcast em inglês', sub:'45min — tech/true crime/educação', time:'8:00', color:'var(--listening)' },
  { id:'l2', group:null, title:'Série/filme + legendas EN', sub:'1h — com legendas em inglês (NÃO português)', time:'12:00', color:'var(--listening)' },
  { id:'l3', group:null, title:'YouTube videos (tech/educação)', sub:'45min — com legendas', time:'18:00', color:'var(--listening)' },
];

const SPEAKING_PROD = [
  { id:'s1', group:'🗣️  Speaking — Saída de voz (tá aqui o desafio)', title:'Conversa com IA (Claude/ChatGPT)', sub:'45min — conversação natural, corrigir erros', time:'9:00', color:'var(--speaking)' },
  { id:'s2', group:null, title:'Gravação de voz — "O que fiz hoje"', sub:'15min — gravar áudio falando em inglês', time:'19:00', color:'var(--speaking)' },
  { id:'s3', group:null, title:'Tandem/HelloTalk (native speaker)', sub:'30min — chat via app, correções reais', time:'20:00', color:'var(--speaking)' },
];

const READING_PROD = [
  { id:'r1', group:'📖  Reading — Leitura ativa', title:'Artigos Medium/Dev.to (tech)', sub:'45min — 1-2 artigos, anotar palavras novas', time:'10:00', color:'var(--reading)' },
  { id:'r2', group:null, title:'Reddit threads (r/learnEnglish, r/programming)', sub:'30min — ler + entender contexto', time:'14:00', color:'var(--reading)' },
  { id:'r3', group:null, title:'Leitura de código (GitHub readmes)', sub:'30min — documentação, READMEs em inglês', time:'16:00', color:'var(--reading)' },
];

const WRITING_PROD = [
  { id:'w1', group:'✍️  Writing — Produção escrita', title:'Reddit comments (responder posts)', sub:'30min — comentários, argumentar em inglês', time:'11:00', color:'var(--writing)' },
  { id:'w2', group:null, title:'Diário em inglês / Journal', sub:'15min — escrever sobre o dia', time:'21:00', color:'var(--writing)' },
];

const ANKI = [
  { id:'a1', group:'🃏  Extra — Anki + Consolidação', title:'Anki (flash cards customizadas)', sub:'30min — vocabulário + frases do dia', time:'7:00', color:'var(--extra)' },
];

function buildTasks(day) {
  const tasks = [];
  
  // Manhã (sempre)
  COMMON_MORNING.forEach(t => tasks.push(t));
  ANKI.forEach(t => tasks.push(t));
  
  // Distribuição semanal (para balancear)
  if (day === 'Segunda' || day === 'Quarta' || day === 'Sexta') {
    // Dias "pesados" em speaking
    SPEAKING_PROD.forEach(t => tasks.push(t));
    LISTENING_HEAVY.slice(0, 2).forEach(t => tasks.push(t)); // 2 listening
    READING_PROD.slice(0, 2).forEach(t => tasks.push(t)); // 2 reading
    WRITING_PROD.slice(0, 1).forEach(t => tasks.push(t)); // 1 writing
  } else if (day === 'Terça' || day === 'Quinta') {
    // Dias "equilibrados"
    LISTENING_HEAVY.forEach(t => tasks.push(t)); // Todos 3
    READING_PROD.forEach(t => tasks.push(t)); // Todos 3
    SPEAKING_PROD.slice(0, 2).forEach(t => tasks.push(t)); // 2 speaking
    WRITING_PROD.forEach(t => tasks.push(t)); // 1 writing
  } else if (day === 'Sábado') {
    // Sábado: Review + extra
    LISTENING_HEAVY.slice(0, 1).forEach(t => tasks.push(t)); // 1 listening
    READING_PROD.slice(0, 1).forEach(t => tasks.push(t)); // 1 reading
    SPEAKING_PROD.slice(0, 1).forEach(t => tasks.push(t)); // 1 speaking
    tasks.push({ id:'review1', group:'📋  Sábado — Review da semana', title:'Review: Gravar semana inteira de áudio', sub:'comparar dia 1 vs dia 7 — TÁ GRITANTE a diferença', time:'15:00', color:'var(--extra)' });
    tasks.push({ id:'review2', group:null, title:'Anotar palavras que NÃO soube', sub:'adicionar no Anki pra semana que vem', time:'16:00', color:'var(--extra)' });
  } else if (day === 'Domingo') {
    // Domingo: Descanso ativo
    tasks.push({ id:'rest1', group:'☀️  Domingo — Descanso ativo', title:'Escolhe uma: filme/série favorita EM INGLÊS', sub:'sem pressão, só curtição', time:'14:00', color:'var(--listening)' });
    tasks.push({ id:'rest2', group:null, title:'Planejamento da próxima semana', sub:'revisar metas, ajustar cronograma se necessário', time:'19:00', color:'var(--extra)' });
  }
  
  return tasks;
}

function getKey(day) { return `english_${day}_${getWeekId()}`; }
function getWeekId() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}_w${week}`;
}

function loadDone(day) {
  try { return JSON.parse(localStorage.getItem(getKey(day)) || '[]'); } catch { return []; }
}
function saveDone(day, done) {
  localStorage.setItem(getKey(day), JSON.stringify(done));
}

let currentDay = null;
let doneTasks = [];

function renderDays() {
  const container = document.getElementById('days');
  container.innerHTML = '';
  DAYS.forEach((day, i) => {
    const tasks = buildTasks(day);
    const done = loadDone(day);
    const btn = document.createElement('div');
    btn.className = 'day-btn' + (day === currentDay ? ' active' : '');
    const total = tasks.length;
    const doneCount = done.length;
    let dots = '';
    const max = Math.min(total, 5);
    for (let j = 0; j < max; j++) {
      dots += `<div class="day-dot${j < doneCount ? ' done' : ''}"></div>`;
    }
    btn.innerHTML = `<div class="day-name">${SHORT[i]}</div><div class="day-dot-row">${dots}</div>`;
    btn.onclick = () => selectDay(day);
    container.appendChild(btn);
  });
}

function updateRing(done, total) {
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  const offset = 132 - (132 * pct / 100);
  document.getElementById('ring').style.strokeDashoffset = offset;
  document.getElementById('ring-pct').textContent = pct + '%';
}

function updateStats() {
  const tasks = buildTasks(currentDay);
  doneTasks = loadDone(currentDay);
  
  const byType = {
    listening: 0, listening_done: 0,
    speaking: 0, speaking_done: 0,
    reading: 0, reading_done: 0,
    writing: 0, writing_done: 0
  };
  
  tasks.forEach(task => {
    const isDone = doneTasks.includes(task.id);
    if (task.color.includes('listening')) {
      byType.listening++;
      if (isDone) byType.listening_done++;
    } else if (task.color.includes('speaking')) {
      byType.speaking++;
      if (isDone) byType.speaking_done++;
    } else if (task.color.includes('reading')) {
      byType.reading++;
      if (isDone) byType.reading_done++;
    } else if (task.color.includes('writing')) {
      byType.writing++;
      if (isDone) byType.writing_done++;
    }
  });
  
  const stats = document.getElementById('stats');
  stats.innerHTML = `
    <div class="stat">
      <div class="stat-val">${byType.listening_done}/${byType.listening}</div>
      <div class="stat-label">Listening</div>
    </div>
    <div class="stat">
      <div class="stat-val">${byType.speaking_done}/${byType.speaking}</div>
      <div class="stat-label">Speaking</div>
    </div>
    <div class="stat">
      <div class="stat-val">${byType.reading_done}/${byType.reading}</div>
      <div class="stat-label">Reading</div>
    </div>
    <div class="stat">
      <div class="stat-val">${byType.writing_done}/${byType.writing}</div>
      <div class="stat-label">Writing</div>
    </div>
  `;
}

function renderTasks() {
  const tasks = buildTasks(currentDay);
  doneTasks = loadDone(currentDay);
  const container = document.getElementById('tasks');
  container.innerHTML = '';
  const allDone = document.getElementById('all-done');
  allDone.classList.remove('show');

  let lastGroup = null;
  tasks.forEach(task => {
    if (task.group && task.group !== lastGroup) {
      const label = document.createElement('div');
      label.className = 'task-group-label';
      label.textContent = task.group;
      container.appendChild(label);
      lastGroup = task.group;
    }
    const isDone = doneTasks.includes(task.id);
    const el = document.createElement('div');
    el.className = 'task' + (isDone ? ' done' : '');
    el.style.setProperty('--task-color', task.color || 'transparent');
    el.innerHTML = `
      <div class="task-info">
        <div class="task-title">${task.title}</div>
        ${task.sub ? `<div class="task-sub">${task.sub}</div>` : ''}
      </div>
      ${task.time ? `<div class="task-time">${task.time}</div>` : ''}
      <div class="check">${isDone ? '✓' : ''}</div>
    `;
    el.onclick = () => toggleTask(task.id);
    container.appendChild(el);
  });

  updateRing(doneTasks.length, tasks.length);
  updateStats();

  if (doneTasks.length === tasks.length && tasks.length > 0) {
    allDone.classList.add('show');
  }
}

function toggleTask(id) {
  const idx = doneTasks.indexOf(id);
  if (idx === -1) doneTasks.push(id);
  else doneTasks.splice(idx, 1);
  saveDone(currentDay, doneTasks);
  renderTasks();
  renderDays();
}

function resetDay() {
  localStorage.removeItem(getKey(currentDay));
  doneTasks = [];
  renderTasks();
  renderDays();
}

function selectDay(day) {
  currentDay = day;
  document.getElementById('day-title').textContent = day + '-feira' + (day === 'Sábado' || day === 'Domingo' ? '' : '');
  if (day === 'Sábado' || day === 'Domingo') document.getElementById('day-title').textContent = day;
  renderDays();
  renderTasks();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
const todayNames = { 1:'Segunda', 2:'Terça', 3:'Quarta', 4:'Quinta', 5:'Sexta', 6:'Sábado', 0:'Domingo' };
const now = new Date();
const todayDay = todayNames[now.getDay()];
const opts = { weekday: 'long', day: 'numeric', month: 'long' };
document.getElementById('today-label').textContent = now.toLocaleDateString('pt-BR', opts);
currentDay = todayDay;
renderDays();
renderTasks();
document.getElementById('day-title').textContent = currentDay === 'Sábado' || currentDay === 'Domingo' ? currentDay : currentDay + '-feira';
</script>
</body>
</html>
